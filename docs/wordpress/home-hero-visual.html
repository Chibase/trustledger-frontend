<!--
  TrustLedger Home — hero visual (replace the PLACEHOLDER block only)

  1. Capture a screenshot of the open trial product:
     https://trustledger-frontend-pi.vercel.app/demo
     (auto-enters /app — no login)
  2. WordPress → Media → Add New → upload the PNG/JPG
  3. Copy the file URL
  4. Paste this whole <div class="hero__visual">…</div> over the existing
     placeholder block on the Home page Custom HTML
  5. Replace PASTE_MEDIA_URL_HERE with your uploaded image URL
  6. Update / Publish → hard refresh
-->
<div class="hero__visual">
  <img
    class="hero__visual-img"
    src="PASTE_MEDIA_URL_HERE"
    alt="TrustLedger dashboard — grievance and trust operations overview"
    width="1200"
    height="900"
    loading="eager"
    decoding="async"
  />
</div>
